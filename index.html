<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>求人票抽出デモ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>求人票抽出デモ</h1>
      <p class="lead">求人票テキストを貼り付けて「抽出する」を押すと、見出しごとに整理して表示します。</p>
      <p class="sample-link"><a href="sample.txt" target="_blank" rel="noopener noreferrer">sample.txt（サンプル求人票）を開く</a></p>

      <label for="jobText" class="label">求人票テキスト</label>
      <textarea id="jobText" placeholder="ここに求人票テキストを貼り付けてください"></textarea>

      <div class="button-row">
        <button id="extractButton" type="button">抽出する</button>
        <button id="copyButton" type="button" class="sub">結果をコピーする</button>
      </div>

      <section class="result" aria-live="polite">
        <h2>抽出結果</h2>
        <div id="resultArea"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
